title = "Gitleaks config"

[allowlist]
paths = [
    '''(^|/)\.gitignore''',
    '''(^|/)package-lock\.json''',
    '''(^|/)yarn\.lock''',
    '''(^|/)\.gitleaks\.toml''',
]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''(?:github_pat|ghp_|gho_|ghu_|ghs_|ghr_)[a-zA-Z0-9_]{36,}'''
tags = ["github", "token"]

[[rules]]
id = "github-fine-grained-pat"
description = "GitHub Fine-Grained PAT"
regex = '''github_pat_[a-zA-Z0-9_]{82,}'''
tags = ["github", "token"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey|api[_-]?secret|api[_-]?token)[\s=:"'`]*[a-zA-Z0-9_\-]{16,}'''
tags = ["api", "key"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN\s?(?:RSA|DSA|EC|OPENSSH|PGP)?\s?PRIVATE\s?KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9_\-]{10,}\.[a-zA-Z0-9_\-]{10,}\.[a-zA-Z0-9_\-]{10,}'''
tags = ["jwt", "token"]

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-[0-9a-zA-Z-]{10,}'''
tags = ["slack", "token"]

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z_\-]{35}'''
tags = ["google", "api", "key"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot Token"
regex = '''[0-9]{8,10}:[a-zA-Z0-9_\-]{35}'''
tags = ["telegram", "bot", "token"]

[[rules]]
id = "generic-password"
description = "Generic Password in Code"
regex = '''(?i)(?:password|passwd|pwd)[\s=:"'`]*[a-zA-Z0-9_\-!@#$%^&*()]{8,}'''
tags = ["password"]

[[rules]]
id = "connection-string"
description = "Database Connection String"
regex = '''(?:postgresql|mysql|sqlserver|mongodb)://[a-zA-Z0-9_\-]+:[^@\s]{3,}@'''
tags = ["database", "connection"]

[[rules]]
id = "openai-key"
description = "OpenAI API Key"
regex = '''sk-[a-zA-Z0-9_\-]{20,}'''
tags = ["openai", "api", "key"]

[[rules]]
id = "sendgrid-key"
description = "SendGrid API Key"
regex = '''SG\.[a-zA-Z0-9_\-]{22}\.[a-zA-Z0-9_\-]{43}'''
tags = ["sendgrid", "api", "key"]

[[rules]]
id = "azure-key"
description = "Azure Key / Connection String"
regex = '''(?:AccountKey|AccountName|DefaultEndpointsProtocol)=[a-zA-Z0-9_\-+=/]+'''
tags = ["azure", "key"]

[[rules]]
id = "stripe-key"
description = "Stripe API Key"
regex = '''(?:sk_live|pk_live)_[a-zA-Z0-9_\-]{20,}'''
tags = ["stripe", "key"]

[[rules]]
id = "heroku-api-key"
description = "Heroku API Key"
regex = '''(?:heroku|HRKU-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'''
tags = ["heroku", "api", "key"]

[[rules]]
id = "gitlab-pat"
description = "GitLab Personal Access Token"
regex = '''glpat-[a-zA-Z0-9_\-]{20,}'''
tags = ["gitlab", "token"]

[[rules]]
id = "twilio-key"
description = "Twilio API Key"
regex = '''SK[a-f0-9]{32}'''
tags = ["twilio", "key"]

[[rules]]
id = "pypi-token"
description = "PyPI API Token"
regex = '''pypi-[a-zA-Z0-9_\-]{30,}'''
tags = ["pypi", "token"]

[[rules]]
id = "npm-token"
description = "npm Access Token"
regex = '''npm_[a-zA-Z0-9_\-]{30,}'''
tags = ["npm", "token"]

[[rules]]
id = "docker-pat"
description = "Docker Personal Access Token"
regex = '''dckr_pat_[a-zA-Z0-9_\-]{30,}'''
tags = ["docker", "token"]
