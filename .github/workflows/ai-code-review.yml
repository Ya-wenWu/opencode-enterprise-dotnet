name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate diff
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Install dependencies
        run: pip install httpx==0.27.2

      - name: Run AI Code Review (Gemini → NVIDIA → Groq)
        id: review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python .github/scripts/code_review.py /tmp/pr_diff.txt "$PR_TITLE" > /tmp/review_output.md 2>&1 || ec=$?
          echo "Review exit code: ${ec:-0}"
          echo "review_output=/tmp/review_output.md" >> "$GITHUB_ENV"
          exit ${ec:-0}

      - name: Post review comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.review_output, 'utf8').substring(0, 65536);
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const botComments = comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('## Summary')
            );
            for (const c of botComments.slice(0, -1)) {
              await github.rest.issues.deleteComment({
                ...context.repo,
                comment_id: c.id,
              });
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body,
            });
